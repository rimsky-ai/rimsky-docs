# Forbidden terms in the public-surface documentation.
# Each entry has:
#   term:        Go-flavored regex (RE2). The vocabulary lint compiles this as-is.
#   replacement: free-text guidance shown in the lint failure message.
#   scope:       list of single-level globs (filepath.Glob shapes). No `**`.
#
# The lint scope is the public surface only. Layered colloquialisms (e.g. the
# bundled-services-layer "store") are disambiguated in concept-file prose, not
# enforced via grep, so their patterns are NOT in this list.
#
# Per-line ignore convention: place `<!-- vocabulary-lint-ignore: <term> -->`
# on the line *immediately preceding* the offending line. (A same-line trailing
# comment also suppresses the hit on that line — see the lint's per-line logic.)

forbidden:
  # User-confirmed seed (spec §7.3).
  - term: '\btemplate_id\b'
    replacement: template_hash
    scope: &public_surface_md
      - docs/concepts/*.md
      - docs/protocols/*.md
      - docs/agents/*.md
      - docs/agents/*.txt
      - docs/agents/errors/*.md
      - docs/agents/examples/*.md
      - docs/humans/*.md
      - docs/glossary.md
      - docs/vocabulary.md
      - docs/licensing.md
      - docs/README.md
      - docs/roadmap.md
      - docs/comparison.md
      - llms.txt
      - llms-full.txt
      - README.md

  - term: '\bconsumer_key\b'
    replacement: instance_key
    scope: *public_surface_md

  - term: '\bsubstrate\b'
    replacement: 'store (bundled-services-layer) or claim producer (protocol-layer) per context'
    scope: *public_surface_md

  # Spec §7.3 additions (obsolete table names — strict word-boundary match).
  - term: '\brimsky_dispatch\b'
    replacement: rimsky_node_runs
    scope: *public_surface_md

  - term: '\brimsky_lock_holders\b'
    replacement: rimsky_claim_handles
    scope: *public_surface_md

  - term: '\brimsky_store_lifecycle\b'
    replacement: rimsky_lifecycle_idempotencies
    scope: *public_surface_md

  # Protocol-layer interface name `Store`. The pattern matches only the
  # backticked form, which is the canonical way technical interface names are
  # cited in markdown. Bare-prose "Store" or compound colloquial forms
  # ("Filesystem Store", "Postgres Store") at the bundled-services layer are
  # NOT matched. If a concept file actually needs to write the literal
  # backticked `Store` (e.g. when calling out the deprecation), use the
  # per-line ignore convention.
  - term: '`Store`'
    replacement: '`ClaimProducer`'
    scope: *public_surface_md

  # SQL table names are not part of the public surface (spec §1, §13).
  # Public-surface prose names consumer-visible properties, not schema
  # implementation. The deprecated table-name patterns above
  # (rimsky_dispatch / rimsky_lock_holders / rimsky_store_lifecycle) are
  # NOT matched here because they are pre-consolidation table names that
  # were never themselves in the public surface; this rule catches the
  # current-but-internal table names.
  - term: '\brimsky_(claim_handles|node_runs|claim_holders|templates|nodes|template_tags|instances|schedules|lifecycle_idempotencies|node_attributes|events)\b'
    replacement: 'consumer-visible language (e.g. "the claim handle", "the per-run record", "the registered-template store")'
    scope: *public_surface_md

  # Pre-stores-redesign vocabulary — `region` was an early term for the
  # producer-defined slice now called `scope`. The concept-file frontmatter
  # for `scope.md` lists `region` in `deprecated_terms`; this lint catches
  # in-prose drift back to the older word, including the `regional` /
  # `regions` / `regionally` derivations. Producer-internal "region" terms
  # in foundation source are not on the public surface.
  - term: '\bregion(s|al|ally)?\b'
    replacement: scope (or "scoped-access" for the access-shape sense)
    scope: *public_surface_md

  # SQL implementation language must not leak onto the public surface
  # (spec §1, §4). The following patterns catch column-shape, type, and
  # predicate vocabulary that betrays the persistence implementation.
  # Public-surface prose names consumer-visible properties, not schema.
  - term: '\b(BYTEA|BLOB)\b'
    replacement: 'consumer-visible language ("opaque bytes", "byte sequence")'
    scope: *public_surface_md

  - term: '\bON DELETE\b'
    replacement: 'consumer-visible language describing the lifetime guarantee'
    scope: *public_surface_md

  - term: '\bSQL predicate\b'
    replacement: 'consumer-visible description of the check'
    scope: *public_surface_md

  - term: '\bscope_data\b'
    replacement: 'scope bytes'
    scope: *public_surface_md

  - term: '\btemplate_hash TEXT\b'
    replacement: 'template_hash (without SQL type)'
    scope: *public_surface_md

  # 2026-05-12 nomenclature-resolution retirements (spec:2026-05-12-nomenclature-resolution).
  # Each entry catches a retired term reappearing on the public surface.

  # YAML key retirements (spec Group B.6 / C.1 / C.2).
  - term: '^stores:'
    replacement: 'claim_producers:'
    scope: *public_surface_md

  # Audit-log/event-payload + DB-column rename
  # (spec:2026-05-12-nomenclature-resolution Group B.1 follow-up). The
  # noun `store_name` was retired as a public-surface field name in event
  # payloads, in `table:rimsky_claim_handles`, and in observability query
  # parameters. The colloquial-prose use of "store" at the bundled-services
  # layer is unaffected (this pattern is word-anchored on the snake_case
  # token only).
  - term: '\bstore_name\b'
    replacement: producer_name
    scope: *public_surface_md

  - term: '^\s*write_semantics:\s'
    replacement: 'write_semantics_allowed: [list]'
    scope: *public_surface_md

  - term: '\bwrite_semantics_envelope\b'
    replacement: write_semantics_allowed
    scope: *public_surface_md

  # Template YAML field rename (spec D.1–D.3).
  - term: '^\s*frame_resolution:\s'
    replacement: 'frame_resolution_mode:'
    scope: *public_surface_md

  # Schema/Go-side rename residue (spec A / D / I).
  - term: '\bworker_request\b'
    replacement: node_run
    scope: *public_surface_md

  - term: '\bworker_request_id\b'
    replacement: node_run_id
    scope: *public_surface_md

  - term: '\bWorkerRequest\b'
    replacement: NodeRun
    scope: *public_surface_md

  # Proto service rename (spec E.1).
  - term: '\bNodeExecutor\b'
    replacement: Executor
    scope: *public_surface_md

  # Capabilities RPC harmonization (spec E.11 / B.4).
  - term: '\bGetCapabilities\b'
    replacement: Capabilities
    scope: *public_surface_md

  - term: '\bStoreObservability\b'
    replacement: ClaimProducerObservability
    scope: *public_surface_md

  # Lifecycle slot retirement (spec E.10).
  - term: '\bon_executor_blocked\b'
    replacement: 'on_executor_errored (with error_types: { executor_blocked: ... } mapping)'
    scope: *public_surface_md

  # 2026-05-13 persistence interface rename (deferred B.7 follow-up of
  # spec:2026-05-12-nomenclature-resolution): persistence.Driver →
  # persistence.Database; persistence.Store umbrella → persistence.Tables;
  # 14 per-row-type sub-interfaces normalized to singular <RowKind>Table.
  # The adapter-selector string Config.Driver ("postgres"/"sqlite") stays.
  - term: '\bpersistence\.Driver\b'
    replacement: persistence.Database
    scope: *public_surface_md

  - term: '\bpersistence\.Store\b'
    replacement: persistence.Tables
    scope: *public_surface_md

  - term: '\bTemplateStore\b'
    replacement: TemplateTable
    scope: *public_surface_md

  - term: '\bTemplateTagsStore\b'
    replacement: TemplateTagTable
    scope: *public_surface_md

  - term: '\bInstanceStore\b'
    replacement: InstanceTable
    scope: *public_surface_md

  - term: '\bLifecycleIdempotencyStore\b'
    replacement: LifecycleIdempotencyTable
    scope: *public_surface_md

  - term: '\bNodeStore\b'
    replacement: NodeTable
    scope: *public_surface_md

  - term: '\bClaimHandlesStore\b'
    replacement: ClaimHandleTable
    scope: *public_surface_md

  - term: '\bNodeAttributesStore\b'
    replacement: NodeAttributeTable
    scope: *public_surface_md

  - term: '\bClaimHoldersStore\b'
    replacement: ClaimHolderTable
    scope: *public_surface_md

  - term: '\bEventStore\b'
    replacement: EventTable
    scope: *public_surface_md

  - term: '\bScheduleStore\b'
    replacement: ScheduleTable
    scope: *public_surface_md

  - term: '\bSupervisorStore\b'
    replacement: SupervisorTable
    scope: *public_surface_md

  - term: '\bFrameStore\b'
    replacement: FrameTable
    scope: *public_surface_md

  - term: '\bBlobOrphansStore\b'
    replacement: BlobOrphanTable
    scope: *public_surface_md

  - term: '\bNodeEventsStore\b'
    replacement: NodeEventTable
    scope: *public_surface_md

  # Wire-event renames (spec E.2). The literal proto-message words
  # `Blocked`, `Errored`, `Complete`, `AsyncAccepted`, `ParkRequested` are
  # retired as wire-event names. Bare English usages are unaffected
  # because the patterns require backtick or capitalized-noun context.
  - term: '`Blocked`'
    replacement: '`Error{error_class: "executor_blocked"}` (post-E.2 collapse)'
    scope: *public_surface_md

  - term: '`Errored`'
    replacement: '`Error{error_class}` (post-E.2 wire collapse)'
    scope: *public_surface_md

  - term: '`AsyncAccepted`'
    replacement: '`AwaitAsyncCallback` (post-E.2 rename)'
    scope: *public_surface_md

  - term: '`ParkRequested`'
    replacement: '`Park`'
    scope: *public_surface_md

  - term: '`Snooze`'
    replacement: '`Park`'
    scope: *public_surface_md
