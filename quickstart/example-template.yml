# Two-node cascade demo. Both nodes use the bundled stub executor,
# which keys behavior on `node_type`. The two `items.*` types are
# pre-baked stub fixtures — you can rename to anything; unknown types
# get an empty attributes_delta (still a successful Complete).
#
# Register, deploy, run:
#   ./rimsky template register example-template.yml
#   # → returns template_hash=sha256-...
#   ./rimsky template deploy sha256-...
#   ./rimsky instance create sha256-...
#   # → returns instance_id=01H...
#
# Watch:
#   ./rimsky instance get 01H...                 # JSON dump
#   open http://localhost:8090                       # dashboard
#
# Expected end state: two nodes, both `fresh`. Frame: `resolved`.

name: hello-rimsky
version: "1.0"
frame_resolution_mode: serial_queue

nodes:
  - type: items.fetch
    executor: stub
    attributes:
      schema:
        type: object
        additionalProperties: true

  - type: items.classify
    dependencies: [items.fetch]
    executor: stub
    attributes:
      schema:
        type: object
        additionalProperties: true
