# Quickstart rimsky.yml — wires rimsky/all to the bundled stub
# claim-producer and stub executor over the compose network.
#
# SQLite is the quickstart's default persistence. The unified
# rimsky/all image runs three rimsky processes (scheduler +
# supervisor + control-api) concurrently against one db; that worked
# once the option-C nil-tx refactor removed the auto-commit code
# path that caused self-deadlock on the SQLite single-conn pool.
# State lives in a Docker named volume (see docker-compose.yml).

persistence:
  driver: sqlite
  sqlite:
    path: /var/lib/rimsky/state.db

# Single bundled stub claim-producer. The "stub" name is what node
# declarations reference in their `stores:` block.
claim_producers:
  stub:
    endpoint: "grpc://store-stub:9102"
    protocols: [claim_producer]
    write_semantics_allowed: [sync]

# A single named lock for examples that want to demonstrate
# capacity-bounded coordination.
named_locks:
  example-mutex: { limit: 1 }

# Single bundled stub executor. Always returns Complete with
# `changed: true` and a small attributes_delta keyed on node_type.
executors:
  stub:
    transport: grpc
    endpoint: "executor-stub:9300"
    tls: off
    protocols: [executor]
