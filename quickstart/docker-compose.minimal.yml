# Minimal compose: rimsky/all + stub claim-producer + stub executor.
# No dashboard. For users who want to script against the control API
# without building the Node frontend.
#
# All other behavior matches docker-compose.yml — see that file's
# header for state-volume notes.

services:
  rimsky:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.all
    image: rimsky/all:quickstart
    ports:
      - "${RIMSKY_HOST_PORT:-8080}:8080"
    volumes:
      - ./rimsky.yml:/etc/rimsky/rimsky.yml:ro
      - ${RIMSKY_STATE_DIR:-rimsky-state}:/var/lib/rimsky
    environment:
      RIMSKY_SUPERVISOR_CALLBACK_ADVERTISE_HOST: "rimsky"
      RIMSKY_CONTROL_API_HOST: "0.0.0.0"
      RIMSKY_CONTROL_API_PORT: "8080"
    depends_on:
      store-stub:
        condition: service_started
      executor-stub:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/rimsky", "health", "--endpoint=http://localhost:8080"]
      interval: 2s
      timeout: 2s
      retries: 30

  store-stub:
    build:
      context: ..
      dockerfile: stores/stub/Dockerfile.stub
    image: rimsky/store-stub:quickstart
    environment:
      STORE_STUB_CONFIG: /etc/store/config.yml
    volumes:
      - ./store-stub.yml:/etc/store/config.yml:ro
    expose: ["9102"]

  executor-stub:
    build:
      context: ..
      dockerfile: executors/stub/Dockerfile.stub
    image: rimsky/executor-stub:quickstart
    expose: ["9300"]

volumes:
  rimsky-state:
