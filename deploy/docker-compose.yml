
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: rimsky
      POSTGRES_PASSWORD: rimsky
      POSTGRES_DB: rimsky
    ports:
      - "${POSTGRES_HOST_PORT:-5544}:5432"
    volumes:
      - rimsky-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rimsky -d rimsky"]
      interval: 2s
      timeout: 2s
      retries: 20

  migrate:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: dockerfiles/Dockerfile.go-base
      args:
        BINARY: rimsky-migrate
    image: rimsky/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RIMSKY_CONFIG: "/etc/rimsky/rimsky.yml"
    volumes:
      - ./rimsky.yml:/etc/rimsky/rimsky.yml:ro
    restart: "no"

  # One-shot service that creates the operator-owned `topics_items`
  # items table. The postgres store-service verifies this table's
  # schema at startup; without it the store-service exits.
  init-items:
    image: postgres:15
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: rimsky
    entrypoint: ["bash", "-ec"]
    command:
      - |
        psql -h postgres -U rimsky -d rimsky -v ON_ERROR_STOP=1 <<'SQL'
        CREATE TABLE IF NOT EXISTS topics_items (
            item_id     TEXT PRIMARY KEY,
            payload     JSONB NOT NULL,
            state       TEXT NOT NULL DEFAULT 'available',
            claim_token TEXT,
            claimed_at  TIMESTAMPTZ,
            enqueued_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            priority    INTEGER NOT NULL DEFAULT 0,
            sequence    BIGSERIAL
        );
        CREATE INDEX IF NOT EXISTS topics_items_available_idx
            ON topics_items (priority DESC, sequence) WHERE state = 'available';
        CREATE INDEX IF NOT EXISTS topics_items_in_progress_idx
            ON topics_items (claim_token) WHERE state = 'in_progress';
        SQL
    restart: "no"

  # ----- Standard store-services -----

  store-filesystem:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/stores/filesystem/Dockerfile.filesystem
    image: rimsky/store-filesystem:latest
    environment:
      STORE_FILESYSTEM_CONFIG: "/etc/store/config.yml"
    volumes:
      - ./store-filesystem.yml:/etc/store/config.yml:ro
      - rimsky-content:/workspace/content
    expose:
      - "9100"
      - "9110"

  store-postgres:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/stores/postgres/Dockerfile.postgres
    image: rimsky/store-postgres:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      init-items:
        condition: service_completed_successfully
    environment:
      STORE_POSTGRES_CONFIG: "/etc/store/config.yml"
    volumes:
      - ./store-postgres.yml:/etc/store/config.yml:ro
    expose:
      - "9101"
      - "9111"
      - "9121"
    ports:
      - "${STORE_POSTGRES_ADMIN_HOST_PORT:-9121}:9121"  # admin port exposed for items seeding

  # ----- Rimsky processes -----

  scheduler:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: dockerfiles/Dockerfile.go-base
      args:
        BINARY: rimsky-scheduler
    image: rimsky/scheduler:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      store-filesystem:
        condition: service_started
      store-postgres:
        condition: service_started
    environment:
      RIMSKY_SCHEDULER_TICK_MS: "1500"
      RIMSKY_HEARTBEAT_TIMEOUT_MS: "15000"
      RIMSKY_CONFIG: "/etc/rimsky/rimsky.yml"
    volumes:
      - ./rimsky.yml:/etc/rimsky/rimsky.yml:ro

  supervisor:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: dockerfiles/Dockerfile.go-base
      args:
        BINARY: rimsky-supervisor
    image: rimsky/supervisor:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      store-filesystem:
        condition: service_started
      store-postgres:
        condition: service_started
      claude-agent:
        condition: service_started
      http-node:
        condition: service_started
    environment:
      RIMSKY_SUPERVISOR_CONFIG: "/etc/rimsky/supervisor-config.yml"
      RIMSKY_CONFIG: "/etc/rimsky/rimsky.yml"
      RIMSKY_SUPERVISOR_CALLBACK_ADVERTISE_HOST: "supervisor"
    volumes:
      - ./supervisor-config.yml:/etc/rimsky/supervisor-config.yml:ro
      - ./rimsky.yml:/etc/rimsky/rimsky.yml:ro
      - rimsky-content:/workspace/content

  control-api:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: dockerfiles/Dockerfile.go-base
      args:
        BINARY: rimsky-control-api
    image: rimsky/control-api:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      store-filesystem:
        condition: service_started
      store-postgres:
        condition: service_started
    environment:
      RIMSKY_CONTROL_API_HOST: "0.0.0.0"
      RIMSKY_CONTROL_API_PORT: "8080"
      RIMSKY_CONFIG: "/etc/rimsky/rimsky.yml"
    volumes:
      - ./rimsky.yml:/etc/rimsky/rimsky.yml:ro
    ports:
      - "${CONTROL_API_HOST_PORT:-8080}:8080"

  # ----- Executors -----

  http-node:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/executors/http-node/Dockerfile.http-node
    image: rimsky/executor-http-node:latest
    environment:
      RIMSKY_EXECUTOR_HTTP_NODE_HOST: "0.0.0.0"
      RIMSKY_EXECUTOR_HTTP_NODE_PORT: "9091"
      RIMSKY_EXECUTOR_HTTP_NODE_HTTP_PORT: "9092"
      RIMSKY_EXECUTOR_HTTP_NODE_HTTP_BRIDGE_URL: "http://http-node:9092"
      RIMSKY_EXECUTOR_STUB_MODE: "1"
    volumes:
      - rimsky-content:/workspace/content
    ports:
      - "${HTTP_NODE_GRPC_HOST_PORT:-9091}:9091"
      - "${HTTP_NODE_HTTP_HOST_PORT:-9092}:9092"

  claude-agent:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/executors/claude-agent/Dockerfile
    image: rimsky/executor-claude-agent:latest
    environment:
      RIMSKY_EXECUTOR_HOST: "0.0.0.0"
      RIMSKY_EXECUTOR_PORT_GRPC: "9090"
      RIMSKY_EXECUTOR_PORT_HTTP: "9190"
      RIMSKY_EXECUTOR_OBSERVABILITY_HTTP_BRIDGE_URL: "http://claude-agent:9190"
      RIMSKY_EXECUTOR_STUB_MODE: "1"
    volumes:
      - rimsky-content:/workspace/content
    ports:
      - "${CLAUDE_AGENT_GRPC_HOST_PORT:-9090}:9090"
      - "${CLAUDE_AGENT_HTTP_HOST_PORT:-9190}:9190"

  # ----- Reference dashboard -----

  rimsky-dashboard:
    build:
      context: ${RIMSKY_DASHBOARD_REPO:-../../rimsky-dashboard}
      dockerfile: Dockerfile
    image: rimsky/dashboard:latest
    depends_on:
      - control-api
    environment:
      RIMSKY_CONTROL_API_URL: "http://control-api:8080"
      PORT: "8090"
    ports:
      - "${DASHBOARD_HOST_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----- Bundled sensors (Publisher protocol) -----
  # Each sensor implements the Publisher protocol and POSTs message
  # envelopes to control-api's generic /instances/{id}/messages
  # endpoint with sender_kind="publisher". Per concept:replica, the
  # v1 contract is single-replica per sensor binary.

  sensor-cron:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/sensors/sensor-cron/Dockerfile.sensor-cron
    image: rimsky/sensor-cron:latest
    depends_on:
      - control-api
    environment:
      RIMSKY_ENDPOINT: "http://control-api:8080"
      RIMSKY_SENSOR_CRON_HOST: "0.0.0.0"
      RIMSKY_SENSOR_CRON_PORT: "9081"
    ports:
      - "${SENSOR_CRON_HOST_PORT:-9081}:9081"

  sensor-http:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/sensors/sensor-http/Dockerfile.sensor-http
    image: rimsky/sensor-http:latest
    depends_on:
      - control-api
      - postgres
    environment:
      RIMSKY_ENDPOINT: "http://control-api:8080"
      RIMSKY_SENSOR_HTTP_HOST: "0.0.0.0"
      RIMSKY_SENSOR_HTTP_PORT: "9082"
      RIMSKY_SENSOR_HTTP_STATE_DSN: "postgres://rimsky:rimsky@postgres:5432/rimsky?sslmode=disable"
    ports:
      - "${SENSOR_HTTP_HOST_PORT:-9082}:9082"

  sensor-object-store:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/sensors/sensor-object-store/Dockerfile.sensor-object-store
    image: rimsky/sensor-object-store:latest
    depends_on:
      - control-api
      - postgres
    environment:
      RIMSKY_ENDPOINT: "http://control-api:8080"
      RIMSKY_SENSOR_OBJECT_STORE_HOST: "0.0.0.0"
      RIMSKY_SENSOR_OBJECT_STORE_PORT: "9083"
      RIMSKY_SENSOR_OBJECT_STORE_STATE_DSN: "postgres://rimsky:rimsky@postgres:5432/rimsky?sslmode=disable"
    ports:
      - "${SENSOR_OBJECT_STORE_HOST_PORT:-9083}:9083"

  sensor-webhook:
    build:
      context: ${RIMSKY_REPO:-../../rimsky}
      dockerfile: lib/services/sensors/sensor-webhook/Dockerfile.sensor-webhook
    image: rimsky/sensor-webhook:latest
    depends_on:
      - control-api
      - postgres
    environment:
      RIMSKY_ENDPOINT: "http://control-api:8080"
      RIMSKY_SENSOR_WEBHOOK_HOST: "0.0.0.0"
      RIMSKY_SENSOR_WEBHOOK_PORT: "9084"
      RIMSKY_SENSOR_WEBHOOK_HTTP_PORT: "9184"
      RIMSKY_SENSOR_WEBHOOK_STATE_DSN: "postgres://rimsky:rimsky@postgres:5432/rimsky?sslmode=disable"
    ports:
      - "${SENSOR_WEBHOOK_GRPC_HOST_PORT:-9084}:9084"
      - "${SENSOR_WEBHOOK_HTTP_HOST_PORT:-9184}:9184"

volumes:
  rimsky-pg: {}
  # Shared filesystem-store root mounted on the filesystem store-service
  # (which serves it via the 4-verb protocol) and on both executors
  # (which read/write region paths handed to them by the supervisor).
  rimsky-content: {}
