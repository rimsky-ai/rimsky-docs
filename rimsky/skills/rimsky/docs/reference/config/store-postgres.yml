# Per-store-service config for the `store-postgres` reference service.
# Mounted at /etc/store/config.yml inside the container; the binary finds
# it only via STORE_POSTGRES_CONFIG (no baked default — unset exits non-zero).
connection: "postgres://rimsky:rimsky@postgres:5432/rimsky?sslmode=disable"
# write_semantics declares the single value this store-service realizes
# on every Open; it is also the full set the service advertises on the
# Capabilities handshake. Omitted/empty defaults to staged_async.
# rimsky.yml's claim_producers[*].write_semantics_allowed must be a
# non-empty subset of the advertised set — here, exactly [sync].
write_semantics: sync
pick_policies:
  "@review-queue":
    items_table: topics_items
    on_commit: recycle
    on_give_up: recycle
    visibility_timeout_seconds: 300
host: 0.0.0.0
grpc_port: 9101
http_port: 9111
http_bridge_url: "http://store-postgres:9111"
admin_port: 9121
sweep_interval_seconds: 30
# Optional protocol mix-ins on the same binary. Defaults: false.
# enable_lifecycle: true   # also serve the LifecycleSubscriber protocol
# enable_executor: true    # also serve the Executor protocol (atomic-staging-with-verifier pattern)
