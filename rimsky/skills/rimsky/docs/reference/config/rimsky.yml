# Operator config bundle — a reference rimsky.yml. Loaded
# by rimsky-scheduler / rimsky-supervisor / rimsky-control-api / rimsky-migrate
# at startup via RIMSKY_CONFIG.
#
# 2026-05-12 nomenclature resolution:
#   - block `stores:` retired (was renamed `claim_producers:` in
#     Phase 4); the alias is no longer accepted.
#   - per-service `protocols: [...]` list (defaults: [claim_producer] /
#     [executor]; add `lifecycle_subscriber` for services that opt in).
#   - per-producer `write_semantics_allowed: [...]` set (operator-
#     declared subset of the producer-advertised allowed values).
#     Renamed from `write_semantics_envelope` in the 2026-05-12 pass;
#     the single-value `write_semantics:` shortcut was also retired.
#
# Reference stack ships:
#   - content        : filesystem store-service (sync).
#   - topics-ring    : postgres store-service hosting the @review-queue
#                      pick policy.
#   - topics-ring:concurrent-claims: counting-semaphore (limit 5).
#   - model-budget   : counting-semaphore (limit 50).

persistence:
  driver: postgres
  postgres:
    dsn: "postgres://rimsky:rimsky@db.internal:5432/rimsky?sslmode=disable"
  # Optional blob backend for spilling large attribute / event /
  # parked-payload bytes (plan §D). Default backend "inline" writes
  # everything inline; "pg-largeobject" / "filesystem" / "memory"
  # spill above spill_threshold_bytes.
  #
  # blob:
  #   backend: pg-largeobject              # inline | pg-largeobject | filesystem | memory
  #   spill_threshold_bytes: 65536         # default 64 KiB; bytes ≤ this stay inline
  #   filesystem:
  #     root: /var/lib/rimsky/blobs        # required when backend=filesystem
  #   pg_largeobject:
  #     schema: public                     # optional; reserved for future per-schema separation
  #   retention:
  #     orphan_sweep_interval: 1h          # SweepOrphanedBlobs cadence (default 1h)
  #     retention_after_unreferenced: 24h  # window before deletion (default 24h)

# Trailing-window retention for the scheduler tick. Each key is a
# trailing time window (Go duration); rows older than the window are
# reaped by the scheduler tick's retention sweeps.
# Retention is ON by default: the whole block — and any individual key —
# may be omitted and the documented default applies. An explicit `0s`
# DISABLES that one sweep (it is NOT re-defaulted). A negative value is a
# startup error.
retention:
  recent_frames_kept: 100                  # run-tree trace: most-recent frames kept per run-tree regardless of age (default 100)
  trace_trailing: 720h                     # run-tree trace trailing window (default 30d = 720h)
  lineage_trailing: 720h                   # lineage-record trailing window (default 30d)
  claim_handles_trailing: 720h             # released claim-handle trailing window (default 30d; 0s keeps handles forever)
  message_idempotencies_trailing: 24h      # rimsky_message_idempotencies trailing window (default 24h)

# Deployment-level fallback cap on parked duration, keyed by the stored
# park reason. The two-value enum is closed: only `await_callback` and
# `snooze` are accepted (any other key is a startup error). The per-row
# rimsky_node_runs.max_park_duration_seconds always wins when set; these
# are the deployment-wide defaults when it is NULL. Omit the block for no
# deployment-level cap.
max_park_duration:
  await_callback: 168h                     # 7d
  snooze: 1h

claim_producers:
  content:
    # gRPC dispatch endpoint. Used for the ClaimProducer 4-verb runtime
    # protocol plus the Capabilities startup handshake.
    endpoint: "grpc://store-filesystem:9100"
    protocols: [claim_producer]
    write_semantics_allowed: [sync]
  topics-ring:
    endpoint: "grpc://store-postgres:9101"
    protocols: [claim_producer]
    write_semantics_allowed: [sync]

named_locks:
  "topics-ring:concurrent-claims": { limit: 5 }
  model-budget:                    { limit: 50 }

executors:
  # For executors whose HTTP+JSON bridge runs on a different port from
  # gRPC (every peer in this repo), the operator configures the peer
  # with an `http_bridge_url` and the dashboard auto-discovers it
  # through the observability handshake. Use `observability_endpoint:`
  # only when an executor splits its gRPC observability service onto a
  # different port from the dispatch service.
  claude-agent:
    transport: grpc
    endpoint: "claude-agent:9090"
    tls: off
    protocols: [executor]
  http-node:
    transport: grpc
    endpoint: "http-node:9091"
    tls: off
    protocols: [executor]

# Publishers are peer services that POST message envelopes into rimsky
# via the generic /instances/{id}/messages endpoint with
# sender_kind="publisher". Sensors are one kind of publisher; the four
# bundled sensors below all implement the Publisher protocol per spec
# .ok-planner/specs/2026-05-17-sensor-messaging-unification-design.md.
publishers:
  sensor-cron:
    endpoint: "sensor-cron:9081"
    protocols: [publisher]
  sensor-http:
    endpoint: "sensor-http:9082"
    protocols: [publisher]
  sensor-object-store:
    endpoint: "sensor-object-store:9083"
    protocols: [publisher]
  sensor-webhook:
    endpoint: "sensor-webhook:9084"
    protocols: [publisher]
